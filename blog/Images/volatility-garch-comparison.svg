<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>GARCH vs Deep Learning Trade-offs</title>
<desc>Comparative architecture showing GARCH's analytical elegance against deep learning's representational flexibility in volatility forecasting.</desc>
<defs>
<marker id="arrow-thin" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
:root { color-scheme: light dark; }
@media (prefers-color-scheme: dark) {
  text { fill: #e8e6da; }
  .label-main { fill: #e8e6da; font-weight: 500; font-size: 13px; }
  .label-sub { fill: #a8a6a0; font-size: 11px; }
  .accent { fill: none; stroke: #534AB7; stroke-width: 1; }
  .accent-teal { fill: none; stroke: #0F6E56; stroke-width: 1; }
  .accent-red { fill: none; stroke: #A32D2D; stroke-width: 1; }
}
@media (prefers-color-scheme: light) {
  text { fill: #3d3d3a; }
  .label-main { fill: #1a1a17; font-weight: 500; font-size: 13px; }
  .label-sub { fill: #73726c; font-size: 11px; }
  .accent { fill: none; stroke: #7F77DD; stroke-width: 1; }
  .accent-teal { fill: none; stroke: #1D9E75; stroke-width: 1; }
  .accent-red { fill: none; stroke: #E24B4A; stroke-width: 1; }
}
</style>
</defs>

<!-- Left column: GARCH -->
<g>
<text x="100" y="25" class="label-main">GARCH</text>
<text x="100" y="42" class="label-sub">Parametric elegance</text>

<!-- Input -->
<circle cx="100" cy="80" r="8" class="accent" stroke-width="1.5"/>
<text x="100" y="105" class="label-sub" text-anchor="middle">Returns</text>

<!-- Arrow -->
<path d="M100,88 L100,110" class="accent" marker-end="url(#arrow-thin)" stroke-width="1"/>

<!-- GARCH formulation -->
<rect x="60" y="115" width="80" height="60" class="accent" rx="2"/>
<text x="100" y="138" class="label-main" text-anchor="middle">σ²ₜ = α + β₁εₜ₋₁² + β₂σ²ₜ₋₁</text>
<text x="100" y="152" class="label-sub" text-anchor="middle">Conditional variance</text>
<text x="100" y="163" class="label-sub" text-anchor="middle">specification</text>

<!-- Arrow -->
<path d="M100,175 L100,195" class="accent" marker-end="url(#arrow-thin)" stroke-width="1"/>

<!-- Strengths box -->
<rect x="45" y="200" width="110" height="100" class="accent" rx="2"/>
<text x="100" y="220" class="label-main" text-anchor="middle" font-size="12">Strengths</text>
<text x="53" y="238" class="label-sub">• Closed form</text>
<text x="53" y="252" class="label-sub">• Parameters</text>
<text x="53" y="266" class="label-sub">  interpretable</text>
<text x="53" y="280" class="label-sub">• Fast inference</text>
<text x="53" y="294" class="label-sub">• Proven stable</text>

<!-- Arrow -->
<path d="M100,300 L100,320" class="accent" marker-end="url(#arrow-thin)" stroke-width="1"/>

<!-- Limitations -->
<rect x="45" y="325" width="110" height="100" class="accent-red" rx="2"/>
<text x="100" y="345" class="label-main" text-anchor="middle" font-size="12">Limitations</text>
<text x="53" y="363" class="label-sub">• Gaussian</text>
<text x="53" y="377" class="label-sub">  assumption</text>
<text x="53" y="391" class="label-sub">• Stationary</text>
<text x="53" y="405" class="label-sub">  specification</text>
<text x="53" y="419" class="label-sub">• Misses regimes</text>
</g>

<!-- Center: Comparison axis -->
<line x1="200" y1="0" x2="200" y2="520" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
<text x="200" y="20" class="label-sub" text-anchor="middle" font-size="10">Analytical ←→ Adaptive</text>

<!-- Right column: Deep Learning -->
<g>
<text x="580" y="25" class="label-main" text-anchor="end">Deep Learning</text>
<text x="580" y="42" class="label-sub" text-anchor="end">Representational flexibility</text>

<!-- Input -->
<circle cx="580" cy="80" r="8" class="accent-teal" stroke-width="1.5"/>
<text x="580" y="105" class="label-sub" text-anchor="middle">Sequences</text>

<!-- Arrow -->
<path d="M580,88 L580,110" class="accent-teal" marker-end="url(#arrow-thin)" stroke-width="1"/>

<!-- LSTM architecture -->
<rect x="520" y="115" width="120" height="60" class="accent-teal" rx="2"/>
<text x="580" y="135" class="label-main" text-anchor="middle" font-size="12">LSTM/Attention</text>
<text x="580" y="150" class="label-sub" text-anchor="middle">hₜ = LSTM(εₜ, hₜ₋₁)</text>
<text x="580" y="163" class="label-sub" text-anchor="middle">Non-linear feature learning</text>

<!-- Arrow -->
<path d="M580,175 L580,195" class="accent-teal" marker-end="url(#arrow-thin)" stroke-width="1"/>

<!-- Strengths box -->
<rect x="510" y="200" width="140" height="100" class="accent-teal" rx="2"/>
<text x="580" y="220" class="label-main" text-anchor="middle" font-size="12">Strengths</text>
<text x="590" y="238" class="label-sub">• Non-linear mapping</text>
<text x="590" y="252" class="label-sub">• Adaptive to regimes</text>
<text x="590" y="266" class="label-sub">• Feature interactions</text>
<text x="590" y="280" class="label-sub">• Handles complexity</text>
<text x="590" y="294" class="label-sub">• Seq. dependence</text>

<!-- Arrow -->
<path d="M580,300 L580,320" class="accent-teal" marker-end="url(#arrow-thin)" stroke-width="1"/>

<!-- Limitations -->
<rect x="510" y="325" width="140" height="100" class="accent-red" rx="2"/>
<text x="580" y="345" class="label-main" text-anchor="middle" font-size="12">Limitations</text>
<text x="590" y="363" class="label-sub">• Data hungry</text>
<text x="590" y="377" class="label-sub">• Black box</text>
<text x="590" y="391" class="label-sub">• Uncertainty</text>
<text x="590" y="405" class="label-sub">  quantification</text>
<text x="590" y="419" class="label-sub">• Overfitting risk</text>
</g>

<!-- Synthesis section -->
<rect x="60" y="450" width="560" height="50" class="accent" rx="2"/>
<text x="340" y="470" class="label-main" text-anchor="middle" font-size="12">Hybrid: Bayesian Realized GARCH with Neural Variance Adaptation</text>
<text x="340" y="485" class="label-sub" text-anchor="middle">Structural persistence + learned non-linear conditional variance + epistemic uncertainty quantification</text>
</svg>